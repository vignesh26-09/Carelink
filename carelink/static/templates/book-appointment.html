<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/cards.css">
  <link rel="stylesheet" href="../static/css/forms.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink</div>
      <div class="user-menu">
        <div class="user-avatar">P</div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div class="row">
      <div class="col-6" style="max-width: 600px;">
        <h1 style="margin-bottom: 2rem;">Book an Appointment</h1>

        <div class="card">
          <div class="card-body">
            <form id="bookingForm">
              <div class="form-group">
                <label class="form-label">Select Doctor</label>
                <select class="form-control" id="doctorSelect" required>
                  <option>Choose a doctor...</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Preferred Date</label>
                <input type="date" class="form-control" id="appointmentDate" required>
              </div>

              <div class="form-group">
                <label class="form-label">Preferred Time</label>
                <select class="form-control" id="appointmentTime" required>
                  <option>Choose a time...</option>
                  <option>09:00 AM</option>
                  <option>09:30 AM</option>
                  <option>10:00 AM</option>
                  <option>10:30 AM</option>
                  <option>02:00 PM</option>
                  <option>02:30 PM</option>
                  <option>03:00 PM</option>
                </select>
              </div>

              <div class="form-group">
                <label class="form-label">Reason for Visit</label>
                <textarea class="form-control" id="reasonForVisit" rows="4" placeholder="Please describe your symptoms or reason for visit..."></textarea>
              </div>

              <button type="submit" class="btn btn-primary btn-block">Book Appointment</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/notifications.js"></script>
  
  <script>
    async function loadDoctors() {
      try {
        const doctors = await api.getAllDoctors();
        const select = document.getElementById('doctorSelect');
        const options = doctors.map(d => `<option value="${d.id}">${d.firstName} ${d.lastName} - ${d.specialization}</option>`).join('');
        select.innerHTML = '<option>Choose a doctor...</option>' + options;
      } catch (error) {
        Notification.error('Failed to load doctors');
      }
    }

    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const doctorId = document.getElementById('doctorSelect').value;
      const date = document.getElementById('appointmentDate').value;
      const time = document.getElementById('appointmentTime').value;
      const reason = document.getElementById('reasonForVisit').value;

      if (!doctorId || !date || !time) {
        Notification.error('Please fill all required fields');
        return;
      }

      try {
        Notification.info('Booking appointment...');
        const result = await api.bookAppointment({
          doctorId,
          startTime: `${date}T${time}`,
          reasonForVisit: reason
        });

        Notification.success('Appointment booked successfully!');
        setTimeout(() => {
          window.location.href = 'my-appointments.html';
        }, 2000);
      } catch (error) {
        Notification.error('Failed to book appointment: ' + error.message);
      }
    });

    document.addEventListener('DOMContentLoaded', loadDoctors);
  </script>
</body>
</html>

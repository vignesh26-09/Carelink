<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appointments - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/cards.css">
  <link rel="stylesheet" href="../static/css/tables.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink</div>
      <div class="user-menu">
        <div class="user-avatar">P</div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <h1>My Appointments</h1>
      <a href="book-appointment.html" class="btn btn-primary">+ Book New</a>
    </div>

    <div class="card">
      <div class="card-body">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Doctor</th>
              <th>Date & Time</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="appointmentsTable">
            <tr>
              <td colspan="5" style="text-align: center; color: #999;">Loading appointments...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/notifications.js"></script>
  <script src="../static/js/utils.js"></script>
  
  <script>
    async function loadAppointments() {
      try {
        const appointments = await api.getAppointments();
        const tbody = document.getElementById('appointmentsTable');

        if (appointments.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">No appointments booked yet</td></tr>';
          return;
        }

        const html = appointments.map(app => `
          <tr>
            <td>${app.doctorName}</td>
            <td>${Utils.formatDateTime(app.startTime)}</td>
            <td>${app.reasonForVisit || '-'}</td>
            <td><span class="appointment-status status-${app.status.toLowerCase()}">${app.status}</span></td>
            <td>
              <button class="btn btn-sm btn-secondary">View</button>
            </td>
          </tr>
        `).join('');

        tbody.innerHTML = html;
      } catch (error) {
        Notification.error('Failed to load appointments');
      }
    }

    document.addEventListener('DOMContentLoaded', loadAppointments);
  </script>
</body>
</html>

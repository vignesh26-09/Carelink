<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/dashboard.css">
  <link rel="stylesheet" href="../static/css/cards.css">
  <link rel="stylesheet" href="../static/css/tables.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink - Admin</div>
      <div class="user-menu">
        <div class="user-avatar">A</div>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item">
          <a href="#" class="sidebar-menu-link active">Dashboard</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="manage-doctors.html" class="sidebar-menu-link">Manage Doctors</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="manage-patients.html" class="sidebar-menu-link">Manage Patients</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="all-appointments.html" class="sidebar-menu-link">All Appointments</a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <h1 style="margin-bottom: 2rem;">Admin Dashboard</h1>

      <div class="stats-grid">
        <div class="card stat-card primary">
          <div class="stat-number" id="totalDoctors">0</div>
          <div class="stat-label">Total Doctors</div>
        </div>
        
        <div class="card stat-card success">
          <div class="stat-number" id="totalPatients">0</div>
          <div class="stat-label">Total Patients</div>
        </div>
        
        <div class="card stat-card warning">
          <div class="stat-number" id="totalAppointments">0</div>
          <div class="stat-label">Total Appointments</div>
        </div>
        
        <div class="card stat-card info">
          <div class="stat-number" id="completedAppointments">0</div>
          <div class="stat-label">Completed</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Quick Actions</h2>
        </div>
        <div class="card-body">
          <div style="display: flex; gap: 1rem;">
            <a href="manage-doctors.html" class="btn btn-primary">Manage Doctors</a>
            <a href="manage-patients.html" class="btn btn-secondary">Manage Patients</a>
            <a href="all-appointments.html" class="btn btn-info">View Appointments</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/notifications.js"></script>
</body>
</html>

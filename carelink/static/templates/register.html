<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/forms.css">
  <link rel="stylesheet" href="../static/css/cards.css">
</head>
<body style="background-color: #f5f5f5;">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">🏥 CareLink</a>
      <div class="nav-auth">
        <a href="login.html" class="btn-login">Login</a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 3rem 0; display: flex; justify-content: center;">
    <div class="card" style="max-width: 500px; width: 100%; padding: 2rem;">
      <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
      
      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" name="firstName" required>
          </div>

          <div class="form-group">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" name="lastName" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" name="phone" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem;">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/validation.js"></script>
  <script src="../static/js/notifications.js"></script>
  
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!firstName || !lastName || !email || !phone || !password) {
        Notification.error('All fields are required');
        return;
      }

      if (!Validator.validateEmail(email)) {
        Notification.error('Invalid email address');
        return;
      }

      if (password !== confirmPassword) {
        Notification.error('Passwords do not match');
        return;
      }

      Notification.info('Creating account...');
      await AuthHandler.register({
        firstName,
        lastName,
        email,
        phone,
        password,
        role: 'PATIENT'
      });
    });
  </script>
</body>
</html>

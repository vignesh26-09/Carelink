<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/cards.css">
  <link rel="stylesheet" href="../static/css/forms.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink</div>
      <div class="user-menu">
        <div class="user-avatar">P</div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <div class="row">
      <div class="col-6" style="max-width: 600px;">
        <h1 style="margin-bottom: 2rem;">User Profile</h1>

        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Profile Information</h2>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" disabled>
            </div>

            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" disabled>
            </div>

            <div class="form-group">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="phone" disabled>
            </div>

            <button class="btn btn-secondary">Edit Profile</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/auth.js"></script>

  <script>
    const user = AuthHandler.getUser();
    if (user) {
      document.getElementById('fullName').value = user.firstName + ' ' + user.lastName;
      document.getElementById('email').value = user.email;
      document.getElementById('phone').value = user.phone || '';
    }
  </script>
</body>
</html>

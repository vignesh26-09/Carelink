<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/forms.css">
  <link rel="stylesheet" href="../static/css/cards.css">
</head>
<body style="background-color: #f5f5f5;">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">🏥 CareLink</a>
      <div class="nav-auth">
        <a href="register.html" class="btn-signup">Sign Up</a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 3rem 0; display: flex; justify-content: center;">
    <div class="card" style="max-width: 400px; width: 100%; padding: 2rem;">
      <h2 style="text-align: center; margin-bottom: 2rem;">Login to CareLink</h2>
      
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>

        <div class="form-group">
          <label class="form-check">
            <input type="checkbox" class="form-check-input">
            <span class="form-check-label">Remember me</span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem;">
        Don't have an account? <a href="register.html">Sign up here</a>
      </p>
    </div>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/validation.js"></script>
  <script src="../static/js/notifications.js"></script>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (!Validator.validateEmail(email)) {
        Notification.error('Invalid email address');
        return;
      }
      
      if (!Validator.validatePassword(password)) {
        Notification.error('Password is required');
        return;
      }

      Notification.info('Logging in...');
      await AuthHandler.login(email, password);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Dashboard - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/dashboard.css">
  <link rel="stylesheet" href="../static/css/cards.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink</div>
      <button class="hamburger">☰</button>
      <ul class="nav-menu">
        <li class="nav-item"><a href="#" class="nav-link active">Dashboard</a></li>
        <li class="nav-item"><a href="doctors.html" class="nav-link">Find Doctor</a></li>
        <li class="nav-item"><a href="my-appointments.html" class="nav-link">My Appointments</a></li>
      </ul>
      <div class="user-menu">
        <div class="user-avatar">P</div>
        <div class="dropdown-menu">
          <a href="profile.html" class="dropdown-item">👤 Profile</a>
          <a href="settings.html" class="dropdown-item">⚙️ Settings</a>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" onclick="AuthHandler.logout()">🚪 Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item">
          <a href="#" class="sidebar-menu-link active">Dashboard</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="doctors.html" class="sidebar-menu-link">Find Doctor</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="my-appointments.html" class="sidebar-menu-link">My Appointments</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="book-appointment.html" class="sidebar-menu-link">Book Appointment</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="profile.html" class="sidebar-menu-link">Profile</a>
        </li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1 class="dashboard-title">Welcome Back!</h1>
        <div class="dashboard-actions">
          <a href="book-appointment.html" class="btn btn-primary">Book Appointment</a>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="card stat-card primary">
          <div class="stat-number" id="totalAppointments">0</div>
          <div class="stat-label">Total Appointments</div>
        </div>
        
        <div class="card stat-card success">
          <div class="stat-number" id="completedAppointments">0</div>
          <div class="stat-label">Completed</div>
        </div>
        
        <div class="card stat-card warning">
          <div class="stat-number" id="pendingAppointments">0</div>
          <div class="stat-label">Pending</div>
        </div>
        
        <div class="card stat-card info">
          <div class="stat-number" id="favoriteDoctors">0</div>
          <div class="stat-label">Favorite Doctors</div>
        </div>
      </div>

      <!-- Upcoming Appointments -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Upcoming Appointments</h2>
        </div>
        <div class="card-body">
          <div id="upcomingAppointments"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/notifications.js"></script>
  <script src="../static/js/utils.js"></script>
  
  <script>
    async function loadDashboard() {
      try {
        const appointments = await api.getAppointments();
        
        // Update stats
        document.getElementById('totalAppointments').textContent = appointments.length;
        document.getElementById('completedAppointments').textContent = appointments.filter(a => a.status === 'COMPLETED').length;
        document.getElementById('pendingAppointments').textContent = appointments.filter(a => a.status === 'PENDING').length;
        
        // Show upcoming appointments
        const upcomingHTML = appointments
          .filter(a => a.status !== 'CANCELLED')
          .slice(0, 5)
          .map(app => `
            <div class="card appointment-card mb-3">
              <div class="card-body">
                <h5>${app.doctorName}</h5>
                <p class="text-muted">${app.specialization}</p>
                <p>📅 ${Utils.formatDate(app.startTime)}</p>
                <p>⏰ ${Utils.formatTime(app.startTime)}</p>
                <span class="appointment-status status-${app.status.toLowerCase()}">${app.status}</span>
              </div>
            </div>
          `)
          .join('');
        
        document.getElementById('upcomingAppointments').innerHTML = upcomingHTML || '<p class="text-muted">No upcoming appointments</p>';
      } catch (error) {
        console.error('Error loading dashboard:', error);
        Notification.error('Failed to load dashboard');
      }
    }

    // Load dashboard on page load
    document.addEventListener('DOMContentLoaded', loadDashboard);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Doctors - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/cards.css">
  <link rel="stylesheet" href="../static/css/forms.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink</div>
      <button class="hamburger">☰</button>
      <ul class="nav-menu">
        <li class="nav-item"><a href="patient-dashboard.html" class="nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="#" class="nav-link active">Find Doctor</a></li>
        <li class="nav-item"><a href="my-appointments.html" class="nav-link">Appointments</a></li>
      </ul>
      <div class="user-menu">
        <div class="user-avatar">P</div>
        <div class="dropdown-menu">
          <a href="profile.html" class="dropdown-item">👤 Profile</a>
          <button class="dropdown-item" onclick="AuthHandler.logout()">🚪 Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 2rem 0;">
    <h1 style="margin-bottom: 2rem;">Find a Doctor</h1>

    <!-- Search & Filter -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="form-row">
          <div class="form-group">
            <input type="text" class="form-control" id="searchInput" placeholder="Search doctors...">
          </div>
          <div class="form-group">
            <select class="form-control" id="specialtyFilter">
              <option>All Specialties</option>
              <option>Cardiology</option>
              <option>Neurology</option>
              <option>Dermatology</option>
              <option>General Practice</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Doctors List -->
    <div class="row" id="doctorsList"></div>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/notifications.js"></script>
  
  <script>
    async function loadDoctors() {
      try {
        const doctors = await api.getAllDoctors();
        displayDoctors(doctors);
      } catch (error) {
        console.error('Error loading doctors:', error);
        Notification.error('Failed to load doctors');
      }
    }

    function displayDoctors(doctors) {
      const html = doctors.map(doctor => `
        <div class="col-4 mb-4">
          <div class="card doctor-card">
            <div class="card-body">
              <div class="doctor-image" style="width: 150px; height: 150px; background: #ddd; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; border: 3px solid #0066cc;">
                👨‍⚕️
              </div>
              <h3 class="doctor-name">${doctor.firstName} ${doctor.lastName}</h3>
              <p class="doctor-specialty">${doctor.specialization}</p>
              <p class="doctor-rating">⭐ ${doctor.rating || 4.5}/5.0</p>
              <p class="text-muted">${doctor.experience || 5}+ years experience</p>
              <a href="book-appointment.html?doctorId=${doctor.id}" class="btn btn-primary btn-block">Book Appointment</a>
            </div>
          </div>
        </div>
      `).join('');

      document.getElementById('doctorsList').innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', loadDoctors);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard - CareLink</title>
  
  <link rel="stylesheet" href="../static/css/style.css">
  <link rel="stylesheet" href="../static/css/navbar.css">
  <link rel="stylesheet" href="../static/css/buttons.css">
  <link rel="stylesheet" href="../static/css/dashboard.css">
  <link rel="stylesheet" href="../static/css/cards.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">🏥 CareLink - Doctor</div>
      <div class="user-menu">
        <div class="user-avatar">D</div>
        <div class="dropdown-menu">
          <button class="dropdown-item" onclick="AuthHandler.logout()">🚪 Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="sidebar">
      <ul class="sidebar-menu">
        <li class="sidebar-menu-item">
          <a href="#" class="sidebar-menu-link active">Dashboard</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="doctor-schedule.html" class="sidebar-menu-link">My Schedule</a>
        </li>
        <li class="sidebar-menu-item">
          <a href="consultation.html" class="sidebar-menu-link">Consultations</a>
        </li>
      </ul>
    </aside>

    <main class="main-content">
      <h1 style="margin-bottom: 2rem;">Doctor Dashboard</h1>

      <div class="stats-grid">
        <div class="card stat-card primary">
          <div class="stat-number" id="totalConsultations">0</div>
          <div class="stat-label">Total Consultations</div>
        </div>
        
        <div class="card stat-card success">
          <div class="stat-number" id="completedConsultations">0</div>
          <div class="stat-label">Completed</div>
        </div>
        
        <div class="card stat-card warning">
          <div class="stat-number" id="pendingConsultations">0</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Today's Consultations</h2>
        </div>
        <div class="card-body" id="todayConsultations"></div>
      </div>
    </main>
  </div>

  <script src="../static/js/app.js"></script>
  <script src="../static/js/api.js"></script>
  <script src="../static/js/auth.js"></script>
  <script src="../static/js/notifications.js"></script>
</body>
</html>

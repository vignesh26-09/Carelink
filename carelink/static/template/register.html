<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareLink | Patient Registration</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/register.css">

</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center py-5">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-success text-white text-center">

                    <h2>Patient Registration</h2>

                    <p class="mb-0">
                        Create your CareLink account
                    </p>

                </div>

                <div class="card-body p-4">

                    <div id="message"
                         class="alert d-none"></div>

                    <form id="registerForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    First Name
                                </label>

                                <input
                                        type="text"
                                        id="firstName"
                                        class="form-control"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Last Name
                                </label>

                                <input
                                        type="text"
                                        id="lastName"
                                        class="form-control"
                                        required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input
                                    type="email"
                                    id="email"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Phone Number
                            </label>

                            <input
                                    type="tel"
                                    id="phone"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Date of Birth
                            </label>

                            <input
                                    type="date"
                                    id="dob"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Gender
                            </label>

                            <select
                                    id="gender"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Gender
                                </option>

                                <option value="MALE">
                                    Male
                                </option>

                                <option value="FEMALE">
                                    Female
                                </option>

                                <option value="OTHER">
                                    Other
                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Address
                            </label>

                            <textarea
                                    id="address"
                                    class="form-control"
                                    rows="3"
                                    required></textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input
                                        type="password"
                                        id="password"
                                        class="form-control"
                                        required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                        type="password"
                                        id="confirmPassword"
                                        class="form-control"
                                        required>

                            </div>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-success w-100">

                            Register

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        Already have an account?

                        <a href="login.html">

                            Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="../js/register.js"></script>

</body>

</html>

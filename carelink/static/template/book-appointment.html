<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareLink | Book Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           href="patient-dashboard.html">

            CareLink

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="patient-dashboard.html">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="doctors.html">

                        Doctors

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="book-appointment.html">

                        Book Appointment

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-danger ms-lg-3"
                       href="login.html">

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= CONTENT ================= -->

<div class="container py-5">

    <div class="row">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    Book Appointment

                </div>

                <div class="card-body">

                    <form id="appointmentForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Doctor

                            </label>

                            <input
                                    type="text"
                                    id="doctorName"
                                    class="form-control"
                                    readonly>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Specialization

                            </label>

                            <input
                                    type="text"
                                    id="specialization"
                                    class="form-control"
                                    readonly>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Select Available Slot

                            </label>

                            <select
                                    id="slotId"
                                    class="form-select"
                                    required>

                                <option value="">

                                    Choose Slot

                                </option>

                            </select>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Reason for Consultation

                            </label>

                            <textarea
                                    id="reason"
                                    rows="4"
                                    class="form-control"
                                    placeholder="Describe your health concern..."
                                    required></textarea>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-success">

                            Confirm Appointment

                        </button>

                        <a href="doctors.html"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </form>

                </div>

            </div>

        </div>

        <!-- Appointment Summary -->

        <div class="col-lg-4">

            <div class="card shadow border-0">

                <div class="card-header bg-success text-white">

                    Appointment Summary

                </div>

                <div class="card-body">

                    <table class="table">

                        <tr>

                            <th>Doctor</th>

                            <td id="summaryDoctor">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Specialization</th>

                            <td id="summarySpecialization">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Consultation Fee</th>

                            <td id="consultationFee">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Status</th>

                            <td>

                                Pending

                            </td>

                        </tr>

                    </table>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">

    © 2026 CareLink Healthcare Management System

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/book-appointment.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareLink | All Appointments</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           href="admin-dashboard.html">

            CareLink Admin

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="admin-dashboard.html">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="manage-doctors.html">

                        Doctors

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="manage-patients.html">

                        Patients

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="all-appointments.html">

                        Appointments

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-danger ms-lg-3"
                       href="login.html">

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= CONTENT ================= -->

<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">

            All Appointments

        </h2>

        <input
                type="text"
                id="searchAppointment"
                class="form-control w-25"
                placeholder="Search Appointment">

    </div>

    <div class="card shadow border-0">

        <div class="card-header bg-dark text-white">

            Appointment Records

        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-light">

                    <tr>

                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Consultation</th>
                        <th>Action</th>

                    </tr>

                    </thead>

                    <tbody id="appointmentTable">

                    <tr>

                        <td colspan="8"
                            class="text-center">

                            No appointments available.

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">

    © 2026 CareLink Healthcare Management System

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/all-appointments.js"></script>

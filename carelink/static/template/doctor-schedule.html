<!-- ================= CONTENT ================= -->

<div class="container py-5">

    <h2 class="fw-bold mb-4">

        Manage Schedule

    </h2>

    <div class="row">

        <!-- Add Slot -->

        <div class="col-lg-4">

            <div class="card shadow border-0">

                <div class="card-header bg-success text-white">

                    Add Availability Slot

                </div>

                <div class="card-body">

                    <form id="slotForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Date

                            </label>

                            <input
                                   type="date"
                                   id="slotDate"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Time

                            </label>

                            <input
                                   type="time"
                                   id="slotTime"
                                   class="form-control"
                                   required>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-success w-100">

                            Add Slot

                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Slot List -->

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    My Available Slots

                </div>

                <div class="card-body">

                    <div class="table-responsive">

                        <table class="table table-hover">

                            <thead class="table-light">

                            <tr>

                                <th>Slot ID</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Action</th>

                            </tr>

                            </thead>

                            <tbody id="slotTable">

                            <tr>

                                <td colspan="5"
                                    class="text-center">

                                    No slots available.

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

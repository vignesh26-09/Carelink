<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>CareLink | My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body class="bg-light">

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           href="index.html">

            CareLink

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="patient-dashboard.html">

                        Dashboard

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="profile.html">

                        Profile

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="settings.html">

                        Settings

                    </a>

                </li>

                <li class="nav-item">

                    <a class="btn btn-danger ms-lg-3"
                       href="login.html">

                        Logout

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= CONTENT ================= -->

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    My Profile

                </div>

                <div class="card-body">

                    <form id="profileForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input
                                       type="text"
                                       id="fullName"
                                       class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Email

                                </label>

                                <input
                                       type="email"
                                       id="email"
                                       class="form-control"
                                       readonly>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <input
                                       type="text"
                                       id="phone"
                                       class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Role

                                </label>

                                <input
                                       type="text"
                                       id="role"
                                       class="form-control"
                                       readonly>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Address

                            </label>

                            <textarea
                                      id="address"
                                      rows="3"
                                      class="form-control"></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Date of Birth

                            </label>

                            <input
                                   type="date"
                                   id="dob"
                                   class="form-control">

                        </div>

                        <button
                                type="submit"
                                class="btn btn-success">

                            Update Profile

                        </button>

                        <button
                                type="reset"
                                class="btn btn-secondary">

                            Reset

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">

    © 2026 CareLink Healthcare Management System

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/profile.js"></script>

</body>

</html>

        <a class="navbar-brand fw-bold"

        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"

            <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse"

</nav>

<!-- ================= CONTENT ================= -->

<div class="container py-5">

    <h2 class="fw-bold mb-4">

        Finalize Consultation

    </h2>

    <div class="row">

        <!-- Appointment Details -->

        <div class="col-lg-5">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white">

                    Appointment Information

                </div>

                <div class="card-body">

                    <table class="table">

                        <tr>

                            <th>Appointment ID</th>

                            <td id="appointmentId">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Patient</th>

                            <td id="patientName">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Doctor</th>

                            <td id="doctorName">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Date</th>

                            <td id="appointmentDate">

                                -

                            </td>

                        </tr>

                        <tr>

                            <th>Time</th>

                            <td id="appointmentTime">

                                -

                            </td>

                        </tr>

                    </table>

                </div>

            </div>

        </div>

        <!-- Consultation Form -->

        <div class="col-lg-7">

            <div class="card shadow border-0">

                <div class="card-header bg-success text-white">

                    Consultation Result

                </div>

                <div class="card-body">

                    <form id="consultationForm">

                        <div class="mb-3">

                            <label class="form-label">

                                Diagnosis

                            </label>

                            <textarea
                                    id="diagnosis"
                                    rows="4"
                                    class="form-control"
                                    placeholder="Enter diagnosis"
                                    required></textarea>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Prescribed Medications

                            </label>

                            <textarea
                                    id="medications"
                                    rows="5"
                                    class="form-control"
                                    placeholder="Example: Paracetamol, Vitamin C"
                                    required></textarea>

                        </div>

                        <button
                                type="submit"
                                class="btn btn-success">

                            Finalize Consultation

                        </button>

                        <a href="consultation.html"
                           class="btn btn-secondary">

                            Back

                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">

    © 2026 CareLink Healthcare Management System

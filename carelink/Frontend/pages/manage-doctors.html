<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manage Doctors – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="page-title mb-0">Manage Doctors</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDoc"><i class="bi bi-plus-lg"></i> Add Doctor</button>
  </div>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Email</th><th>Specialization</th><th>Experience</th><th>Fee</th><th class="text-end">Action</th></tr></thead>
    <tbody id="rows"></tbody></table></div></div>
</main>

<div class="modal fade" id="addDoc" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
  <form id="docForm"><div class="modal-header"><h5 class="modal-title">Add Doctor</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="dEmail" required></div>
    <div class="mb-3"><label class="form-label">Specialization</label><input class="form-control" id="dSpec" required></div>
    <div class="row"><div class="col-6 mb-3"><label class="form-label">Years of experience</label><input type="number" class="form-control" id="dYears" required min="0"></div>
    <div class="col-6 mb-3"><label class="form-label">Consultation fee ($)</label><input type="number" class="form-control" id="dFee" required min="0"></div></div>
  </div>
  <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary">Add</button></div>
  </form>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
CL.requireAuth('CLINIC_ADMIN'); CL.mountNav('manage-doctors.html');
function render(){
  const d=CL.get('cl_doctors');
  document.getElementById('rows').innerHTML= d.length? d.map(x=>`
    <tr><td>${x.email}</td><td>${x.specialization}</td><td>${x.yearsOfExperience} yrs</td><td>$${x.consultationFee}</td>
    <td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="remove(${x.id})">Remove</button></td></tr>`).join('')
    :'<tr><td colspan="5" class="empty-state">No doctors.</td></tr>';
}
function remove(id){if(!confirm('Remove this doctor?'))return; CL.set('cl_doctors',CL.get('cl_doctors').filter(x=>x.id!==id)); render();}
window.remove=remove;
document.getElementById('docForm').addEventListener('submit',e=>{
  e.preventDefault();
  const d=CL.get('cl_doctors');
  d.push({id:Date.now(),email:dEmail.value,specialization:dSpec.value,yearsOfExperience:+dYears.value,consultationFee:+dFee.value});
  CL.set('cl_doctors',d);
  bootstrap.Modal.getInstance(document.getElementById('addDoc')).hide(); e.target.reset(); render();
});
render();
</script></body></html>

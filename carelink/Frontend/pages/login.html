<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body><div class="auth-wrap">
<div class="auth-card">
  <div class="text-center mb-4">
    <a href="../index.html" class="text-decoration-none"><h3 class="brand-mark mb-0"><i class="bi bi-heart-pulse-fill"></i> CareLink</h3></a>
    <p class="text-muted small mt-1">Sign in to your account</p>
  </div>
  <form id="loginForm">
    <div class="mb-3"><label class="form-label" for="email">Email *</label>
      <input type="email" class="form-control" id="email" required placeholder="you@example.com"></div>
    <div class="mb-3"><label class="form-label" for="password">Password *</label>
      <input type="password" class="form-control" id="password" required></div>
    <div class="mb-3"><label class="form-label small text-muted">Sign in as (demo)</label>
      <select class="form-select" id="role">
        <option value="">Auto-detect from email</option>
        <option value="PATIENT">Patient</option>
        <option value="DOCTOR">Doctor</option>
        <option value="CLINIC_ADMIN">Clinic Admin</option>
      </select></div>
    <button class="btn btn-primary w-100">Sign in</button>
    <div id="err" class="text-danger small mt-3"></div>
  </form>
  <hr>
  <p class="small text-muted mb-1">Demo accounts:</p>
  <ul class="small text-muted mb-0"><li>admin@carelink.com</li><li>doctor@carelink.com</li><li>patient@carelink.com</li></ul>
  <p class="text-center small mt-3 mb-0">No account? <a href="register.html">Register</a></p>
</div></div>
<script src="../js/app.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit',e=>{
  e.preventDefault();
  const email=email.value.trim();
  const pwd=password.value;
  const role=document.getElementById('role').value;
  const r=CL.login(email,pwd,role);
  if(!r.ok){document.getElementById('err').textContent=r.msg;return;}
  location.href='dashboard.html';
});
</script></body></html>

<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Appointments – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">My Appointments</h2>
  <div class="d-flex gap-2 mb-3">
    <input id="q" class="form-control" placeholder="Search by doctor or reason...">
    <select id="f" class="form-select" style="max-width:220px">
      <option value="">All statuses</option><option>PENDING</option><option>CONFIRMED</option><option>COMPLETED</option><option>CANCELLED</option>
    </select>
  </div>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Time</th><th>Doctor</th><th>Reason</th><th>Status</th><th></th></tr></thead>
    <tbody id="rows"></tbody></table></div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
const u=CL.requireAuth('PATIENT'); CL.mountNav('my-appointments.html');
function render(){
  const q=document.getElementById('q').value.toLowerCase(); const f=document.getElementById('f').value;
  const list=CL.get('cl_appts').filter(a=>a.patientEmail===u.email)
    .filter(a=>!f||a.status===f)
    .filter(a=>!q||a.doctorEmail.toLowerCase().includes(q)||a.reason.toLowerCase().includes(q));
  document.getElementById('rows').innerHTML= list.length? list.map(a=>`
    <tr><td>${CL.fmt(a.time)}</td><td>Dr. ${a.doctorEmail}</td><td>${a.reason}</td><td>${CL.statusBadge(a.status)}</td>
    <td class="text-end">${['CANCELLED','COMPLETED'].includes(a.status)?'':`<button class="btn btn-sm btn-outline-danger" onclick="cancelAppt(${a.id})">Cancel</button>`}</td></tr>`).join('')
    :'<tr><td colspan="5" class="empty-state">No appointments.</td></tr>';
}
function cancelAppt(id){
  if(!confirm('Cancel this appointment?')) return;
  const a=CL.get('cl_appts'); const x=a.find(y=>y.id===id); x.status='CANCELLED'; CL.set('cl_appts',a); render();
}
window.cancelAppt=cancelAppt;
document.getElementById('q').addEventListener('input',render);
document.getElementById('f').addEventListener('change',render);
render();
</script></body></html>

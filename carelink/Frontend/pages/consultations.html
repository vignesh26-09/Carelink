<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consultations – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">Consultation Management</h2>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Patient</th><th>Time</th><th>Reason</th><th>Status</th><th class="text-end">Actions</th></tr></thead>
    <tbody id="rows"></tbody></table></div></div>
</main>
<script src="../js/app.js"></script>
<script>
const u=CL.requireAuth('DOCTOR'); CL.mountNav('consultations.html');
function render(){
  const list=CL.get('cl_appts').filter(a=>a.doctorEmail===u.email);
  document.getElementById('rows').innerHTML= list.length? list.map(a=>`
    <tr><td>${a.patientEmail}</td><td>${CL.fmt(a.time)}</td><td>${a.reason}</td><td>${CL.statusBadge(a.status)}</td>
    <td class="text-end">
      ${a.status==='PENDING'?`<button class="btn btn-sm btn-success me-1" onclick="setStatus(${a.id},'CONFIRMED')">Approve</button>`:''}
      ${a.status==='CONFIRMED'?`<button class="btn btn-sm btn-primary me-1" onclick="setStatus(${a.id},'COMPLETED')">Complete</button>`:''}
      ${['CANCELLED','COMPLETED'].includes(a.status)?'':`<button class="btn btn-sm btn-outline-danger" onclick="setStatus(${a.id},'CANCELLED')">Cancel</button>`}
    </td></tr>`).join(''):'<tr><td colspan="5" class="empty-state">No consultations.</td></tr>';
}
function setStatus(id,s){const a=CL.get('cl_appts');a.find(x=>x.id===id).status=s;CL.set('cl_appts',a);render();}
window.setStatus=setStatus; render();
</script></body></html>

<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manage Patients – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">Manage Patients</h2>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Name</th><th>Email</th><th>Blood Group</th><th>Emergency Contact</th><th class="text-end">Action</th></tr></thead>
    <tbody id="rows"></tbody></table></div></div>
</main>
<script src="../js/app.js"></script>
<script>
CL.requireAuth('CLINIC_ADMIN'); CL.mountNav('manage-patients.html');
function render(){
  const p=CL.get('cl_patients');
  document.getElementById('rows').innerHTML= p.length? p.map(x=>`
    <tr><td>${x.fullName}</td><td>${x.email}</td><td>${x.bloodGroup}</td><td>${x.emergencyContact||'—'}</td>
    <td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="remove(${x.id})">Remove</button></td></tr>`).join('')
    :'<tr><td colspan="5" class="empty-state">No patients.</td></tr>';
}
function remove(id){if(!confirm('Remove patient?'))return; CL.set('cl_patients',CL.get('cl_patients').filter(x=>x.id!==id)); render();}
window.remove=remove; render();
</script></body></html>

<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Schedule – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">My Availability Schedule</h2>
  <div class="card-clean p-3 mb-4">
    <h6 class="text-muted text-uppercase small">Add New Availability Slot</h6>
    <form id="slotForm" class="row g-2 align-items-end">
      <div class="col-md-5"><label class="form-label">Start Time</label><input type="datetime-local" id="start" class="form-control" required></div>
      <div class="col-md-5"><label class="form-label">End Time</label><input type="datetime-local" id="end" class="form-control" required></div>
      <div class="col-md-2"><button class="btn btn-primary w-100">Add Slot</button></div>
    </form>
  </div>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Start</th><th>End</th><th>Status</th><th></th></tr></thead>
    <tbody id="rows"></tbody></table></div></div>
</main>
<script src="../js/app.js"></script>
<script>
const u=CL.requireAuth('DOCTOR'); CL.mountNav('schedule.html');
function myDoctorId(){
  const d=CL.get('cl_doctors').find(x=>x.email===u.email);
  if(d) return d.id;
  const docs=CL.get('cl_doctors'); const id=Date.now(); docs.push({id,email:u.email,specialization:'General',yearsOfExperience:1,consultationFee:50}); CL.set('cl_doctors',docs); return id;
}
const did=myDoctorId();
function render(){
  const slots=CL.get('cl_slots').filter(s=>s.doctorId===did);
  document.getElementById('rows').innerHTML= slots.length? slots.map(s=>`
    <tr><td>${CL.fmt(s.start)}</td><td>${CL.fmt(s.end)}</td>
    <td>${s.booked?'<span class="badge bg-info">Booked</span>':'<span class="badge bg-success">Open</span>'}</td>
    <td class="text-end">${s.booked?'':`<button class="btn btn-sm btn-outline-danger" onclick="delSlot(${s.id})">Delete</button>`}</td></tr>`).join('')
    :'<tr><td colspan="4" class="empty-state">No slots yet.</td></tr>';
}
function delSlot(id){const s=CL.get('cl_slots').filter(x=>x.id!==id);CL.set('cl_slots',s);render();}
window.delSlot=delSlot;
document.getElementById('slotForm').addEventListener('submit',e=>{
  e.preventDefault();
  const slots=CL.get('cl_slots');
  slots.push({id:Date.now(),doctorId:did,doctorEmail:u.email,start:start.value,end:end.value,booked:false});
  CL.set('cl_slots',slots); e.target.reset(); render();
});
render();
</script></body></html>

<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manage Patients – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">Manage Patients</h2>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Name</th><th>Email</th><th>Blood Group</th><th>Emergency Contact</th><th class="text-end">Action</th></tr></thead>
    <tbody id="rows"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody></table></div></div>
</main>
<script src="../js/app.js"></script>
<script>
CL.requireAuth('CLINIC_ADMIN'); CL.mountNav('manage-patients.html');
async function load(){
  try{
    const list=await CL.patients.list()||[];
    document.getElementById('rows').innerHTML= list.length? list.map(x=>`
      <tr><td>${x.fullName||'—'}</td><td>${CL.patientEmail(x)}</td><td>${x.bloodGroup||'—'}</td><td>${x.emergencyContact||'—'}</td>
      <td class="text-end"><button class="btn btn-sm btn-outline-danger" onclick="rm(${x.id})">Remove</button></td></tr>`).join('')
      :'<tr><td colspan="5" class="empty-state">No patients.</td></tr>';
  }catch(e){document.getElementById('rows').innerHTML=`<tr><td colspan="5" class="empty-state text-danger">${e.message}</td></tr>`;}
}
async function rm(id){if(!confirm('Remove patient?'))return;try{await CL.patients.remove(id);CL.toast('Removed','success');load();}catch(e){CL.toast(e.message,'danger');}}
window.rm=rm; load();
</script></body></html>

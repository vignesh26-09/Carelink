<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consultations – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">Consultation Management</h2>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Patient</th><th>Time</th><th>Reason</th><th>Status</th><th class="text-end">Actions</th></tr></thead>
    <tbody id="rows"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody></table></div></div>
</main>

<div class="modal fade" id="finalizeModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title">Finalize Consultation</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <div class="mb-3"><label class="form-label">Diagnosis *</label><textarea id="fDiag" class="form-control" rows="3" required></textarea></div>
    <div class="mb-1"><label class="form-label">Medications (JSON)</label>
      <textarea id="fMed" class="form-control" rows="4" placeholder='[{"name":"Paracetamol","dose":"500mg","frequency":"twice daily"}]'></textarea></div>
    <div id="fErr" class="text-danger small mt-2"></div>
  </div>
  <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" id="fSubmit">Finalize</button></div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
CL.requireAuth('DOCTOR'); CL.mountNav('consultations.html');
async function load(){
  try{
    const list=await CL.appointments.mine()||[];
    document.getElementById('rows').innerHTML= list.length? list.map(a=>`
      <tr><td>${CL.patientEmail(a.patient)}</td><td>${CL.fmt(a.slot&&a.slot.startTime)}</td><td>${a.reasonForVisit||'—'}</td><td>${CL.statusBadge(a.status)}</td>
      <td class="text-end">
        ${a.status==='PENDING'?`<button class="btn btn-sm btn-success me-1" onclick="doApprove(${a.id})">Approve</button>`:''}
        ${a.status==='CONFIRMED'?`<button class="btn btn-sm btn-primary me-1" onclick="doStart(${a.id})">Start</button>`:''}
        ${a.status==='IN_PROGRESS'||a.status==='STARTED'?`<button class="btn btn-sm btn-primary me-1" onclick="openFinalize(${a.id})">Finalize</button>`:''}
        ${['CANCELLED','COMPLETED'].includes(a.status)?'':`<button class="btn btn-sm btn-outline-danger" onclick="doCancel(${a.id})">Cancel</button>`}
      </td></tr>`).join(''):'<tr><td colspan="5" class="empty-state">No consultations.</td></tr>';
  }catch(e){document.getElementById('rows').innerHTML=`<tr><td colspan="5" class="empty-state text-danger">${e.message}</td></tr>`;}
}
async function doApprove(id){try{await CL.consultations.approve(id);CL.toast('Approved','success');load();}catch(e){CL.toast(e.message,'danger');}}
async function doStart(id){try{await CL.consultations.start(id);CL.toast('Started','success');load();}catch(e){CL.toast(e.message,'danger');}}
async function doCancel(id){if(!confirm('Cancel this appointment?'))return;try{await CL.appointments.cancel(id);CL.toast('Cancelled','success');load();}catch(e){CL.toast(e.message,'danger');}}
let currentId=null;
function openFinalize(id){currentId=id;document.getElementById('fDiag').value='';document.getElementById('fMed').value='';document.getElementById('fErr').textContent='';new bootstrap.Modal('#finalizeModal').show();}
document.getElementById('fSubmit').addEventListener('click',async()=>{
  const diag=document.getElementById('fDiag').value.trim();
  const med=document.getElementById('fMed').value.trim()||'[]';
  const err=document.getElementById('fErr'); err.textContent='';
  if(!diag){err.textContent='Diagnosis required';return;}
  try{await CL.consultations.finalize(currentId,diag,med);bootstrap.Modal.getInstance(document.getElementById('finalizeModal')).hide();CL.toast('Consultation completed','success');load();}
  catch(e){err.textContent=e.message;}
});
window.doApprove=doApprove;window.doStart=doStart;window.doCancel=doCancel;window.openFinalize=openFinalize;
load();
</script></body></html>

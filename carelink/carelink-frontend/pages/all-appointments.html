<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>All Appointments – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">All Appointments</h2>
  <div class="d-flex gap-2 mb-3">
    <input id="q" class="form-control" placeholder="Search patient, doctor, or reason...">
    <select id="f" class="form-select" style="max-width:220px">
      <option value="">All statuses</option><option>PENDING</option><option>CONFIRMED</option><option>COMPLETED</option><option>CANCELLED</option>
    </select>
  </div>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Time</th><th>Patient</th><th>Doctor</th><th>Reason</th><th>Status</th></tr></thead>
    <tbody id="rows"><tr><td colspan="5" class="empty-state">Loading…</td></tr></tbody></table></div></div>
</main>
<script src="../js/app.js"></script>
<script>
CL.requireAuth('CLINIC_ADMIN'); CL.mountNav('all-appointments.html');
let data=[];
async function load(){
  try{data=await CL.appointments.all()||[];render();}
  catch(e){document.getElementById('rows').innerHTML=`<tr><td colspan="5" class="empty-state text-danger">${e.message}</td></tr>`;}
}
function render(){
  const q=document.getElementById('q').value.toLowerCase(); const f=document.getElementById('f').value;
  const list=data.filter(a=>!f||a.status===f).filter(a=>{
    if(!q) return true;
    return CL.patientEmail(a.patient).toLowerCase().includes(q)||CL.doctorEmail(a.doctor).toLowerCase().includes(q)||(a.reasonForVisit||'').toLowerCase().includes(q);
  });
  document.getElementById('rows').innerHTML= list.length? list.map(a=>`
    <tr><td>${CL.fmt(a.slot&&a.slot.startTime)}</td><td>${CL.patientEmail(a.patient)}</td><td>${CL.doctorEmail(a.doctor)}</td><td>${a.reasonForVisit||'—'}</td><td>${CL.statusBadge(a.status)}</td></tr>`).join('')
    :'<tr><td colspan="5" class="empty-state">No appointments.</td></tr>';
}
document.getElementById('q').addEventListener('input',render);
document.getElementById('f').addEventListener('change',render);
load();
</script></body></html>

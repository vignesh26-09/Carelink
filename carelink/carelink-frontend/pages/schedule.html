<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Schedule – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body>
<div id="nav-slot"></div>
<main class="container-fluid px-4 py-4">
  <h2 class="page-title">My Availability Schedule</h2>
  <div class="card-clean p-3 mb-4">
    <h6 class="text-muted text-uppercase small">Add New Availability Slot</h6>
    <form id="slotForm" class="row g-2 align-items-end">
      <div class="col-md-5"><label class="form-label">Start Time</label><input type="datetime-local" id="start" class="form-control" required></div>
      <div class="col-md-5"><label class="form-label">End Time</label><input type="datetime-local" id="end" class="form-control" required></div>
      <div class="col-md-2"><button class="btn btn-primary w-100" id="btn">Add Slot</button></div>
    </form>
    <div id="err" class="text-danger small mt-2"></div>
  </div>
  <div class="card-clean"><div class="table-responsive"><table class="table align-middle mb-0">
    <thead><tr><th>Start</th><th>End</th><th>Status</th></tr></thead>
    <tbody id="rows"><tr><td colspan="3" class="empty-state">Loading…</td></tr></tbody></table></div></div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
CL.requireAuth('DOCTOR'); CL.mountNav('schedule.html');
async function load(){
  try{
    const slots=await CL.schedule.mine()||[];
    document.getElementById('rows').innerHTML= slots.length? slots.map(s=>`
      <tr><td>${CL.fmt(s.startTime)}</td><td>${CL.fmt(s.endTime)}</td>
      <td>${s.booked?'<span class="badge bg-info">Booked</span>':'<span class="badge bg-success">Open</span>'}</td></tr>`).join('')
      :'<tr><td colspan="3" class="empty-state">No slots yet.</td></tr>';
  }catch(e){document.getElementById('rows').innerHTML=`<tr><td colspan="3" class="empty-state text-danger">${e.message}</td></tr>`;}
}
document.getElementById('slotForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err'); err.textContent='';
  const btn=document.getElementById('btn'); btn.disabled=true;
  try{
    await CL.schedule.createSlot(start.value,end.value);
    e.target.reset(); CL.toast('Slot added','success'); load();
  }catch(ex){err.textContent=ex.message;}
  finally{btn.disabled=false;}
});
load();
</script></body></html>

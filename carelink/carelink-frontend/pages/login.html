<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body><div class="auth-wrap">
<div class="auth-card">
  <div class="text-center mb-4">
    <a href="../index.html" class="text-decoration-none"><h3 class="brand-mark mb-0"><i class="bi bi-heart-pulse-fill"></i> CareLink</h3></a>
    <p class="text-muted small mt-1">Sign in — patient, doctor or admin</p>
  </div>
  <form id="loginForm">
    <div class="mb-3"><label class="form-label" for="email">Email *</label>
      <input type="email" class="form-control" id="email" required></div>
    <div class="mb-3"><label class="form-label" for="password">Password *</label>
      <input type="password" class="form-control" id="password" required></div>
    <button class="btn btn-primary w-100" id="btn">Sign in</button>
    <div id="err" class="text-danger small mt-3"></div>
  </form>
  <hr>
  <div class="d-flex justify-content-between align-items-center">
    <a href="register.html" class="small">Create patient account</a>
    <button class="btn btn-sm btn-link p-0" data-bs-toggle="modal" data-bs-target="#apiModal"><i class="bi bi-gear"></i> API settings</button>
  </div>
</div></div>

<div class="modal fade" id="apiModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title">Backend API URL</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body"><input id="apiInput" class="form-control"><p class="small text-muted mt-2 mb-0">Default <code>http://localhost:8080</code></p></div>
  <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
  <button class="btn btn-primary" id="saveApi">Save</button></div>
</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/app.js"></script>
<script>
document.getElementById('apiInput').value=CL.apiUrl();
document.getElementById('saveApi').onclick=()=>{CL.setApiUrl(document.getElementById('apiInput').value);location.reload();};

document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err'); err.textContent='';
  const btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='Signing in...';
  try{
    const res=await CL.auth.login(email.value.trim(),password.value);
    CL.saveUser({email:res.email,role:res.role,token:res.token});
    location.href='dashboard.html';
  }catch(ex){err.textContent=ex.message;btn.disabled=false;btn.textContent='Sign in';}
});
</script></body></html>

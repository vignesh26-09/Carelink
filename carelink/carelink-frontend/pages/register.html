<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register – CareLink</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/styles.css" rel="stylesheet"></head>
<body><div class="auth-wrap">
<div class="auth-card">
  <div class="text-center mb-4">
    <a href="../index.html" class="text-decoration-none"><h3 class="brand-mark mb-0"><i class="bi bi-heart-pulse-fill"></i> CareLink</h3></a>
    <p class="text-muted small mt-1">Create a patient account</p>
  </div>
  <form id="regForm">
    <div class="mb-3"><label class="form-label" for="fullName">Full Name *</label><input class="form-control" id="fullName" required></div>
    <div class="mb-3"><label class="form-label" for="email">Email *</label><input type="email" class="form-control" id="email" required></div>
    <div class="mb-3"><label class="form-label" for="password">Password *</label><input type="password" class="form-control" id="password" required minlength="6"></div>
    <div class="row">
      <div class="col-md-6 mb-3"><label class="form-label" for="bloodGroup">Blood Group *</label>
        <select class="form-select" id="bloodGroup" required><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option selected>O+</option><option>O-</option><option>AB+</option><option>AB-</option></select></div>
      <div class="col-md-6 mb-3"><label class="form-label" for="emergencyContact">Emergency Contact *</label><input class="form-control" id="emergencyContact" required></div>
    </div>
    <button class="btn btn-primary w-100" id="btn">Create account</button>
    <div id="err" class="text-danger small mt-3"></div>
  </form>
  <p class="text-center small mt-3 mb-0">Already have an account? <a href="login.html">Sign in</a></p>
</div></div>
<script src="../js/app.js"></script>
<script>
document.getElementById('regForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err'); err.textContent='';
  const btn=document.getElementById('btn'); btn.disabled=true; btn.textContent='Creating...';
  try{
    const res=await CL.auth.registerPatient({
      email:email.value,password:password.value,fullName:fullName.value,
      bloodGroup:bloodGroup.value,emergencyContact:emergencyContact.value
    });
    CL.saveUser({email:res.email,role:res.role,token:res.token});
    location.href='dashboard.html';
  }catch(ex){err.textContent=ex.message;btn.disabled=false;btn.textContent='Create account';}
});
</script></body></html>
